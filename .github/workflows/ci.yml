name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run fast Go suite
        run: go test ./...

  swift-integration:
    name: Swift Integration
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Show Swift version
        run: swift --version

      - name: Regenerate example client
        run: make -C _examples/ClientExample generate

      - name: Check regenerated example diff
        run: make -C _examples diff

      - name: Build example client
        run: make -C _examples/ClientExample build

      - name: Run shared Swift integration suite
        run: ./Tests/test.sh
